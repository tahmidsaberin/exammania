services:
  postgres:
    image: postgres:16-alpine
    container_name: exammania_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-exammania}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-exammania_secret}
      POSTGRES_DB: ${POSTGRES_DB:-exammania}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-exammania}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: exammania_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-exammania}:${POSTGRES_PASSWORD:-exammania_secret}@postgres:5432/${POSTGRES_DB:-exammania}
      JWT_SECRET: ${JWT_SECRET:-changeme_please_set_a_real_secret_in_env_file_64chars}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-placeholder}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      PORT: 4000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
    container_name: exammania_client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
