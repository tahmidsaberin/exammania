name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
      - run: npm ci
        working-directory: server
      - run: npm ci
        working-directory: client
      - run: npm run lint
        working-directory: server
      - run: npm run lint
        working-directory: client

  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://exammania:testpassword@localhost:5432/exammania_test
      JWT_SECRET: test_jwt_secret_at_least_64_chars_for_ci_testing_purposes_padding!!
      GOOGLE_CLIENT_ID: mock_google_client_id
      GOOGLE_CLIENT_SECRET: mock_secret
      CLIENT_URL: http://localhost:3000
      NODE_ENV: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: exammania
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: exammania_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - run: npx prisma generate
        working-directory: server
      - run: npx prisma migrate deploy
        working-directory: server
      - run: npm run test:ci
        working-directory: server
      - uses: codecov/codecov-action@v4
        with:
          directory: server/coverage
          flags: server

  test-client:
    name: Client Tests
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: mock_google_client_id
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
        working-directory: client
      - run: npm run test:ci
        working-directory: client

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test-server, test-client]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}/client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy client to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: client
          vercel-args: "--prod"
      - name: Deploy server to Railway
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            https://backboard.railway.app/graphql/v2
      - name: Health check
        run: |
          sleep 30
          curl --fail ${{ secrets.PRODUCTION_API_URL }}/health
          echo "✅ Health check passed"
